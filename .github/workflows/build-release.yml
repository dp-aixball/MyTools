name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-apple-darwin,aarch64-apple-darwin
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build (Intel)
      run: |
        cd color-clicker
        cargo build --release --target x86_64-apple-darwin
    
    - name: Build (Apple Silicon)
      run: |
        cd color-clicker
        cargo build --release --target aarch64-apple-darwin
    
    - name: Create Universal Binary
      run: |
        cd color-clicker
        lipo -create \
          target/x86_64-apple-darwin/release/color-clicker \
          target/aarch64-apple-darwin/release/color-clicker \
          -output target/color-clicker-universal
        chmod +x target/color-clicker-universal
    
    - name: Create Professional DMG Package
      run: |
        cd color-clicker
        
        # 1. 创建标准的 .app 目录结构
        mkdir -p "Color Clicker.app/Contents/MacOS"
        mkdir -p "Color Clicker.app/Contents/Resources"
        
        # 2. 复制二进制文件
        cp target/color-clicker-universal "Color Clicker.app/Contents/MacOS/color-clicker"
        chmod +x "Color Clicker.app/Contents/MacOS/color-clicker"
        
        # 3. 生成 Info.plist
        cat > "Color Clicker.app/Contents/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>color-clicker</string>
            <key>CFBundleIdentifier</key>
            <string>com.colorclicker.app</string>
            <key>CFBundleName</key>
            <string>Color Clicker</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.3.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.12</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # 4. 创建打包根目录
        mkdir -p dmg-root
        cp -R "Color Clicker.app" dmg-root/
        cp config.json dmg-root/
        cp README.md dmg-root/
        
        # 5. 创建 Applications 文件夹快捷方式
        ln -s /Applications dmg-root/Applications
        
        # 6. 创建 DMG
        hdiutil create -volname "Color Clicker" \
          -srcfolder dmg-root \
          -ov -format UDZO \
          color-clicker-${{ github.ref_name }}-macos.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: color-clicker-macos
        path: color-clicker/color-clicker-${{ github.ref_name }}-macos.dmg
  
  build-ubuntu:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          libxkbcommon-dev libssl-dev libgtk-3-dev \
          libxdo-dev libxtst-dev libx11-dev
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: |
        cd color-clicker
        cargo build --release
    
    - name: Install packaging tools
      run: |
        sudo apt-get install -y dpkg-dev debhelper fakeroot
    
    - name: Create DEB Package
      run: |
        cd color-clicker
        
        # 创建 DEB 包结构 (关键：包含 DEBIAN 目录)
        mkdir -p debian/DEBIAN
        mkdir -p debian/usr/local/bin
        mkdir -p debian/usr/share/doc/color-clicker
        mkdir -p debian/usr/share/applications
        mkdir -p debian/usr/share/pixmaps
        
        # 复制二进制文件
        cp target/release/color-clicker debian/usr/local/bin/
        chmod +x debian/usr/local/bin/color-clicker
        
        # 复制文档
        cp README.md debian/usr/share/doc/color-clicker/
        cp config.json debian/usr/share/doc/color-clicker/
        cp ../LICENSE debian/usr/share/doc/color-clicker/ 2>/dev/null || true
        
        # 创建桌面启动器
        cat > debian/usr/share/applications/color-clicker.desktop << 'EOF'
        [Desktop Entry]
        Name=Color Clicker
        Comment=悬浮框颜色检测自动点击工具
        Exec=/usr/local/bin/color-clicker
        Icon=color-clicker
        Terminal=false
        Type=Application
        Categories=Utility;Development;
        Keywords=color;clicker;screenshot;automation;
        EOF
        
        # 创建 Debian 控制文件
        cat > debian/DEBIAN/control << EOF
        Package: color-clicker
        Version: ${GITHUB_REF_NAME#v}
        Architecture: amd64
        Depends: libxcb1, libx11-6, libssl3, libxtst6
        Maintainer: Color Clicker Team
        Description: Floating window color detection and auto-click tool
        EOF
        
        # 创建 postinst 脚本
        cat > debian/DEBIAN/postinst << 'EOF'
        #!/bin/bash
        set -e
        echo "Color Clicker installed successfully!"
        exit 0
        EOF
        chmod 755 debian/DEBIAN/postinst
        
        # 构建 DEB 包
        fakeroot dpkg-deb --build debian color-clicker-${{ github.ref_name }}-linux.deb
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: color-clicker-linux
        path: color-clicker/color-clicker-${{ github.ref_name }}-linux.deb
  
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Setup NSIS
      run: |
        choco install nsis -y
        "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: |
        cd color-clicker
        cargo build --release
    
    - name: Create EXE Installer
      run: |
        cd color-clicker
        makensis installer.nsi
        mv color-clicker-setup.exe color-clicker-${{ github.ref_name }}-windows-setup.exe
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: color-clicker-windows
        path: color-clicker/color-clicker-${{ github.ref_name }}-windows-setup.exe
  
  release:
    needs: [build-macos, build-ubuntu, build-windows]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          color-clicker-macos/*.dmg
          color-clicker-linux/*.deb
          color-clicker-windows/*.exe
        generate_release_notes: true
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
